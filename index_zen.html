<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoMap - Zen (Minimal)</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Zen Styles -->
    <link rel="stylesheet" href="style_zen.css">
</head>

<body>

    <div id="toast-container"></div>

    <!-- Login Modal -->
    <div id="login-screen" class="hidden"
        style="position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); width:320px; padding:40px; z-index:10000;">
        <h2 class="panel-title" style="margin-top:0;">LOGIN</h2>
        <div class="form-group" style="margin-bottom:15px;">
            <label style="font-weight:700; font-size:0.8rem; display:block; margin-bottom:5px;">USERNAME</label>
            <input type="text" id="login-user" style="width:100%; border:2px solid black; padding:10px;">
        </div>
        <div class="form-group" style="margin-bottom:25px;">
            <label style="font-weight:700; font-size:0.8rem; display:block; margin-bottom:5px;">PASSWORD</label>
            <input type="password" id="login-pass" style="width:100%; border:2px solid black; padding:10px;">
        </div>
        <button class="btn-save" onclick="login()">ENTER</button>
        <button class="btn-save" style="background:white; color:black; border:2px solid black; margin-top:10px;"
            onclick="document.getElementById('login-screen').classList.add('hidden')">CANCEL</button>
    </div>

    <!-- Sidebar Layout -->
    <div id="sidebar-container" id="sidebar">
        <div class="brand-header">
            <h1>EcoMap</h1>
            <span>Project Zen</span>
        </div>

        <div class="nav-group">
            <span class="nav-label">Data Query</span>
            <input type="text" id="search-input" placeholder="Search..." autocomplete="off">
            <div id="search-suggestions" class="hidden"
                style="border:2px solid black; border-top:none; background:white;"></div>
        </div>

        <div class="nav-group">
            <span class="nav-label">Filters</span>
            <div class="filter-grid">
                <button id="filter-all" class="capsule-btn hidden" onclick="filterMarkers('all')">All</button>
                <button class="capsule-btn" onclick="filterMarkers('Garbage Containers')">Bins</button>
                <button class="capsule-btn" onclick="filterMarkers('Dumping Yard')">Yards</button>
                <button class="capsule-btn" onclick="filterMarkers('Korgans')">Korgans</button>
                <button class="capsule-btn" onclick="findNearest()" id="find-nearest-btn">Nearest</button>
            </div>
        </div>

        <div class="nav-group">
            <span class="nav-label">Tools</span>
            <div class="tool-list">
                <div class="tool-btn" id="mark-btn" onclick="toggleMarkMode()">
                    <i class="fa-solid fa-plus"></i> Add New Point
                </div>
                <div class="tool-btn" onclick="switchLayer('street')"> <!-- Just street for Zen, keep it clean -->
                    <i class="fa-regular fa-map"></i> Reset View
                </div>
                <div class="tool-btn" onclick="locateUser()">
                    <i class="fa-solid fa-location-arrow"></i> My Position
                </div>
                <div class="tool-btn" onclick="toggleThemeModal()">
                    <i class="fa-solid fa-palette"></i> Switch Theme
                </div>
            </div>
        </div>

        <!-- Auth / User section at bottom -->
        <div id="user-badge" onclick="handleAuthClick()">
            <span>GUEST USER</span>
            <i id="auth-icon" class="fa-solid fa-arrow-right-to-bracket"></i>
        </div>

        <!-- Hidden elements required by script.js but not visualized same way -->
        <div id="auth-btn" style="display:none;"></div>
    </div>

    <!-- Map Area -->
    <div id="map-container">
        <div id="map"></div>

        <!-- Float items on map -->
        <div class="zoom-controls">
            <button onclick="map.zoomIn()"><i class="fa-solid fa-plus"></i></button>
            <button onclick="map.zoomOut()"><i class="fa-solid fa-minus"></i></button>
        </div>

        <div id="chatbot-icon" onclick="toggleChat()">
            <i class="fa-solid fa-comment"></i>
        </div>

        <div id="chatbot-box" class="hidden">
            <div class="chat-header">
                EcoGuide
                <i class="fa-solid fa-xmark" onclick="toggleChat()" style="cursor:pointer;"></i>
            </div>
            <div id="chat-messages">
                <div class="message bot-msg">System ready.</div>
            </div>
            <div class="chat-input-area">
                <input type="text" id="chat-input" style="flex:1; border:none; outline:none; font-family:'Courier New';"
                    placeholder="Type..." onkeypress="handleChatKey(event)">
                <button id="voice-mic" style="background:none; border:none; cursor:pointer;"
                    onclick="initVoiceCommand()"><i class="fa-solid fa-microphone"></i></button>
                <button style="background:none; border:none; cursor:pointer;" onclick="sendMessage()"><i
                        class="fa-solid fa-arrow-right"></i></button>
            </div>
        </div>
    </div>

    <!-- Info Panel / Drawer -->
    <div id="info-panel" class="hidden">
        <button class="panel-close-btn" onclick="closePanel()">&times;</button>
        <div id="panel-content">
            <!-- Dynamic Content -->
        </div>
    </div>

    <!-- Report Modal -->
    <div id="report-modal" class="hidden"
        style="position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); width:400px; padding:30px; z-index:9999;">
        <button onclick="closeReportModal()"
            style="position:absolute; top:15px; right:15px; background:none; border:none; font-size:1.5rem; cursor:pointer;">&times;</button>
        <h2 class="panel-title" style="font-size:1.5rem; margin-top:0;">REPORT ISSUE</h2>

        <label style="display:block; font-weight:bold; margin-bottom:5px;">LOCATION</label>
        <input type="text" id="report-location"
            style="width:100%; border:2px solid black; padding:10px; margin-bottom:15px; background:#eee;" readonly>

        <label style="display:block; font-weight:bold; margin-bottom:5px;">ISSUE TYPE</label>
        <select id="report-type"
            style="width:100%; border:2px solid black; padding:10px; margin-bottom:15px; border-radius:0;">
            <option value="full">Container Full</option>
            <option value="damaged">Damaged</option>
            <option value="missing">Missing</option>
            <option value="illegal-dump">Illegal Dump</option>
        </select>

        <label style="display:block; font-weight:bold; margin-bottom:5px;">DESCRIPTION</label>
        <textarea id="report-description" rows="4"
            style="width:100%; border:2px solid black; padding:10px; margin-bottom:20px;"></textarea>

        <button class="btn-save" onclick="submitReport()">SUBMIT REPORT</button>
    </div>

    <!-- Theme Modal -->
    <div id="theme-modal" class="hidden"
        style="position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); width:350px; background:white; border:3px solid black; box-shadow:15px 15px 0px black; padding:30px; z-index:11000;">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h2 style="font-weight:900; margin:0; text-transform:uppercase;">Select Interface</h2>
            <button onclick="toggleThemeModal()"
                style="background:none; border:none; font-size:1.5rem; cursor:pointer;">&times;</button>
        </div>

        <div style="display:flex; flex-direction:column; gap:10px;">
            <button onclick="switchTheme('index_organic.html')" class="btn-save"
                style="background:white; color:black; border:2px solid black;">Organic</button>
            <button onclick="switchTheme('index_aero.html')" class="btn-save"
                style="background:white; color:black; border:2px solid black;">Aero</button>
            <button onclick="switchTheme('index_zen.html')" class="btn-save"
                style="background:black; color:white; border:2px solid black;">Zen (Active)</button>
            <button onclick="switchTheme('index_flow.html')" class="btn-save"
                style="background:white; color:black; border:2px solid black;">Flow</button>
        </div>
    </div>

    <script>
        function toggleThemeModal() {
            document.getElementById('theme-modal').classList.toggle('hidden');
        }
        function switchTheme(file) {
            window.location.href = file;
        }
    </script>

    <!-- Loading Overlay -->
    <div id="loading-overlay" class="hidden"
        style="position:fixed; inset:0; background:rgba(255,255,255,0.9); z-index:9999; display:flex; align-items:center; justify-content:center;">
        <div style="text-align:center; font-weight:900;">
            LOADING DATA...
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>
    <script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>

    <script src="containers.js"></script>
    <script src="markers.js"></script>
    <script src="lahore_boundary.js"></script>
    <script src="lahore_data_v2.js"></script>
    <script src="korgans.js"></script>
    <script src="chatbot_database.js"></script>
    <script src="script.js"></script>

</body>

</html>
